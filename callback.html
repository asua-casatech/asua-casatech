<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Conectando...</title></head>
<body style="font-family:sans-serif;text-align:center;padding:60px">
<h2>Capturando codigo...</h2>
<div id="r" style="margin-top:30px;padding:20px;background:#f0f0f0;border-radius:10px;font-size:18px">Aguarde...</div>
<script>
const code = new URLSearchParams(window.location.search).get('code');
document.getElementById('r').innerHTML = code ? 
'Cole no Claude: <br><br><b style="font-size:26px">'+code+'</b>' : 
'Erro: '+window.location.href;
</script>
</body>
</html>
